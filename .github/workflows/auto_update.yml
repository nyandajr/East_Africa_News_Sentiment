name: EA News Sentiment Hourly Update

on:
  workflow_dispatch: {}

jobs:
  update_data:
    runs-on: ubuntu-latest
    environment: EA_sentiment

    steps:
      - name: Check NEWSAPI_KEY secret
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
        run: |
          if [ -z "$NEWSAPI_KEY" ]; then
            echo "NEWSAPI_KEY is EMPTY"
          else
            echo "NEWSAPI_KEY is SET - length=${#NEWSAPI_KEY}"
          fi
