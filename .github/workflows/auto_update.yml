name: EA News Sentiment Hourly Update

on:
  schedule:
    - cron: '0 * * * *'  # every hour on the hour
  workflow_dispatch: {}   # manual trigger

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update_data:
    runs-on: ubuntu-latest
    environment: EA_sentiment        # ← THIS is the key fix

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run fetch+sentiment+storage
        env:
          NEWSAPI_KEY:   ${{ secrets.NEWSAPI_KEY }}
          COMMIT_USER:   ${{ secrets.COMMIT_USER }}
          COMMIT_EMAIL:  ${{ secrets.COMMIT_EMAIL }}
          SMTP_USER:     ${{ secrets.SMTP_USER }}
          SMTP_PASS:     ${{ secrets.SMTP_PASS }}
          EMAIL_FROM:    ${{ secrets.EMAIL_FROM }}
          EMAIL_TO:      ${{ secrets.EMAIL_TO }}
        run: |
          python src/run_update.py

      - name: Commit and push data
        run: |
          git config user.name "${{ secrets.COMMIT_USER }}"
          git config user.email "${{ secrets.COMMIT_EMAIL }}"
          git add data/sentiment_news.csv
          git commit -m "data: hourly sentiment update $(date -u +'%Y-%m-%dT%H:%M:%SZ')" || echo "No changes to commit"
          git push
