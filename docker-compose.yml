version: '3.8'

services:
  ea-news-sentiment:
    build: .
    restart: always
    ports:
      - "8501:8501"
    environment:
      - NEWSAPI_KEY=${NEWSAPI_KEY}
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_SERVER_ENABLE_CORS=false

  scheduler:
    image: python:3.12-slim
    restart: always
    volumes:
      - .:/app
    working_dir: /app
    command: sh -c "pip install --no-cache-dir -r requirements.txt && python -m src.scheduler"
    depends_on:
      - ea-news-sentiment
